name: FSN Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: tuwunel
            archive: tuwunel-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: tuwunel
            archive: tuwunel-linux-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            binary: tuwunel
            archive: tuwunel-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: tuwunel
            archive: tuwunel-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tuwunel.exe
            archive: tuwunel-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev cmake \
            libssl-dev pkg-config

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --no-default-features \
            --features "gzip_compression,brotli_compression,zstd_compression,url_preview,media_thumbnail,release_max_log_level"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate fsn-package.toml
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          REPO="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > fsn-package.toml << EOF
          [package]
          id = "tuwunel"
          name = "Tuwunel"
          version = "${VERSION}"
          category = "server"
          type = "app"
          description = "A Matrix homeserver — federated, real-time communication"
          tags = ["matrix", "chat", "messaging", "federation", "homeserver"]
          icon = "tuwunel"
          upstream = "https://github.com/matrix-construct/tuwunel"

          [app]
          binaries = [
            { os = "linux",   arch = "x86_64",  url = "${REPO}/tuwunel-linux-x86_64.tar.gz" },
            { os = "linux",   arch = "aarch64", url = "${REPO}/tuwunel-linux-aarch64.tar.gz" },
            { os = "macos",   arch = "x86_64",  url = "${REPO}/tuwunel-macos-x86_64.tar.gz" },
            { os = "macos",   arch = "aarch64", url = "${REPO}/tuwunel-macos-aarch64.tar.gz" },
            { os = "windows", arch = "x86_64",  url = "${REPO}/tuwunel-windows-x86_64.zip" },
          ]
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Tuwunel ${{ steps.ver.outputs.tag }}"
          body: |
            Native binaries for Linux (x86_64, aarch64), macOS (x86_64, aarch64), Windows (x86_64).
            Matrix homeserver — upstream: https://github.com/matrix-construct/tuwunel
          files: |
            artifacts/*
            fsn-package.toml
